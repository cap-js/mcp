name: 'Integration tests'
description: 'Run tests with BTP services being bound'
inputs:
  CF_API:
    description: 'Cloud Foundry API endpoint'
    required: true
  CF_USERNAME:
    description: 'Cloud Foundry username'
    required: true
  CF_PASSWORD:
    description: 'Cloud Foundry password'
    required: true
  CF_ORG:
    description: 'Cloud Foundry organization'
    required: true
  CF_SPACE:
    description: 'Cloud Foundry space'
    required: true
  NODE_VERSION:
    description: 'Node.js version to use for tests'
    required: true
  CDS_VERSION:
    description: 'CDS version to install globally (e.g. 9, latest)'
    required: true
  DB_MAJOR:
    description: 'Major version to install for @cap-js/hana and @cap-js/sqlite (e.g. 2 for cds 9, 3 for cds 10)'
    required: true
  MTXS_MAJOR:
    description: 'Major version to install for @sap/cds-mtxs (e.g. 3 for cds 9, 4 for cds 10)'
    required: true
  CDS_MAJOR:
    description: 'Expected @sap/cds runtime major (e.g. 9 or 10). Used to assert the resolved runtime matches the matrix.'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Cloud Foundry CLI (v8.9.0)
      shell: bash
      run: |
        wget "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=8.9.0&source=github-rel" -O cf-cli.tar.gz
        tar -xvzf cf-cli.tar.gz
        sudo mv cf /usr/local/bin/
        sudo mv cf8 /usr/local/bin/
        cf --version

    - name: Authenticate with Cloud Foundry
      shell: bash
      env:
        CF_API: ${{ inputs.CF_API }}
        CF_USERNAME: ${{ inputs.CF_USERNAME }}
        CF_PASSWORD: ${{ inputs.CF_PASSWORD }}
        CF_ORG: ${{ inputs.CF_ORG }}
        CF_SPACE: ${{ inputs.CF_SPACE }}
      run: |
        for i in {1..5}; do
          cf api "$CF_API" && \
          cf auth && \
          cf target -o "$CF_ORG" -s "$CF_SPACE" && break
          echo "cf login failed, retrying ($i/5)..."
          sleep 10
          if [ "$i" -eq 5 ]; then
            echo "cf login failed after 5 attempts."
            exit 1
          fi
        done

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Use Node.js ${{ inputs.NODE_VERSION }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.NODE_VERSION }}

    - name: Install global CDS
      shell: bash
      run: npm i -g @sap/cds-dk@${{ inputs.CDS_VERSION }}

    - name: Pin CDS-line for root and test workspaces
      shell: bash
      run: |
        npm pkg set "devDependencies.@sap/cds=^${{ inputs.CDS_MAJOR }}"
        npm pkg set --workspace=tests/bookshop \
          "dependencies.@sap/cds=^${{ inputs.CDS_MAJOR }}" \
          "dependencies.@cap-js/hana=^${{ inputs.DB_MAJOR }}" \
          "devDependencies.@cap-js/sqlite=^${{ inputs.DB_MAJOR }}"
        npm pkg set --workspace=tests/bookshop-mtx \
          "dependencies.@sap/cds=^${{ inputs.CDS_MAJOR }}" \
          "dependencies.@cap-js/hana=^${{ inputs.DB_MAJOR }}" \
          "devDependencies.@cap-js/sqlite=^${{ inputs.DB_MAJOR }}" \
          "dependencies.@sap/cds-mtxs=^${{ inputs.MTXS_MAJOR }}"

    - name: Install all dependencies
      shell: bash
      run: npm install
    - name: Install bookshop dependencies
      shell: bash
      run: cd tests/bookshop && npm install
    - name: Generate sample card
      shell: bash
      run: npm run generate-sample-card

    - name: Set env variables for unique service naming
      shell: bash
      run: |
        echo "NODE_VERSION_HANA=$(echo ${{ inputs.NODE_VERSION }} | tr . _)" >> $GITHUB_ENV
    - name: CDS Versions being used
      shell: bash
      run: cds v -i
    - name: Assert resolved @sap/cds major matches matrix
      shell: bash
      working-directory: tests/bookshop
      run: |
        got=$(node -p "require('@sap/cds/package.json').version.split('.')[0]")
        want=${{ inputs.CDS_MAJOR }}
        [[ "$got" == "$want" ]] || { echo "::error::cds runtime major $got != expected $want"; exit 1; }

    # Deploy model to HANA
    - name: Create HDI Container
      shell: bash
      run: cf create-service hana hdi-shared cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA
    - name: Deploy to HANA
      shell: bash
      run: cd tests/bookshop && CDS_ENV=production cds deploy --to hana:cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA

    # Bind against BTP services and run tests
    - name: Bind to HANA service
      shell: bash
      run: cds bind db -2 cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA -o package.json
    - name: Run tests in hybrid mode
      shell: bash
      run: cds bind --exec -- npm run test

    # Cleanup BTP services
    - name: Delete HDI Container Key
      if: ${{ always() }}
      shell: bash
      run: cf delete-service-key cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA-key -f

    # Note: The initial delete attempt often fails due to an "ongoing operation on service binding" error.
    - name: Delete HDI Container
      if: ${{ always() }}
      shell: bash
      run: |
        for i in {1..3}; do
          cf delete-service cap-js-mcp-hana-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-$NODE_VERSION_HANA -f && break
          echo "HDI container delete failed, retrying ($i/3)..."
          sleep 10
          if [ "$i" -eq 3 ]; then
            echo "HDI container delete failed after 3 attempts."
            exit 1
          fi
        done
