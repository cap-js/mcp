name: BlackDuck Scans

on:
  workflow_dispatch:
  schedule:
    # Only run twice a week on default branch (main).
    # BlackDuck has a min-scan-interval of 24h:
    - cron: '40 10 * * 3,5'

jobs:
  scans:
    uses: cap/.github/.github/workflows/scans.yml@2aa3675d385e2dbdc1ff7838f8fa22b4735b134c # main
    secrets: inherit
    with:
      project: CDSUMBRELLA