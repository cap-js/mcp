name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, solinas]
    timeout-minutes: 3
    name: SQLite Tests with Node.js ${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        cds-version: [latest]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - run: npm i
      - run: cd tests/bookshop && npm i
      - run: npm run generate-sample-card
      - run: npm run test

  test-hana:
    runs-on: [self-hosted, solinas-medium]
    container:
      image: public.int.repositories.cloud.sap/ubuntu:24.04
    timeout-minutes: 15
    name: HANA Tests with Node.js ${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        cds-version: [latest]
    env:
      CF_USERNAME: ${{ secrets.CF_USERNAME }}
      CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
    steps:
      - run: apt-get update -y && apt-get install make -y
      - uses: actions/checkout@v6
      - uses: cap/.github/.github/actions/git-setup@main
        with:
          com-github-token: ${{ secrets.COM_GITHUB_TOKEN }}
      - name: Run HANA integration tests
        uses: ./.github/actions/integration-tests
        with:
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          NODE_VERSION: ${{ matrix.node-version }}
          CDS_VERSION: ${{ matrix.cds-version }}
