name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [reopened, synchronize, opened]

permissions:
  contents: read

jobs:
  requires-approval:
    runs-on: ubuntu-latest
    name: 'Waiting for PR approval as this workflow runs on pull_request_target'
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.owner.login != 'cap-js'
    environment: pr-approval
    steps:
      - name: Approval Step
        run: echo "This job has been approved!"

  test:
    name: Tests
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        include:
          - { node-version: 22.x, cds-version: 9,      db-major: 2, mtxs-major: 3, cds-major: 9  }
          - { node-version: 22.x, cds-version: latest, db-major: 3, mtxs-major: 4, cds-major: 10 }
          - { node-version: 24.x, cds-version: 9,      db-major: 2, mtxs-major: 3, cds-major: 9  }
          - { node-version: 24.x, cds-version: latest, db-major: 3, mtxs-major: 4, cds-major: 10 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - name: Pin CDS-line for root and test workspaces
        run: |
          npm pkg set "devDependencies.@sap/cds=^${{ matrix.cds-major }}"
          npm pkg set --workspace=tests/bookshop \
            "dependencies.@sap/cds=^${{ matrix.cds-major }}" \
            "dependencies.@cap-js/hana=^${{ matrix.db-major }}" \
            "devDependencies.@cap-js/sqlite=^${{ matrix.db-major }}"
          npm pkg set --workspace=tests/bookshop-mtx \
            "dependencies.@sap/cds=^${{ matrix.cds-major }}" \
            "dependencies.@cap-js/hana=^${{ matrix.db-major }}" \
            "devDependencies.@cap-js/sqlite=^${{ matrix.db-major }}" \
            "dependencies.@sap/cds-mtxs=^${{ matrix.mtxs-major }}"
      - run: npm i
      - run: cd tests/bookshop && cds v -i
      - name: Assert resolved @sap/cds major matches matrix
        working-directory: tests/bookshop
        run: |
          got=$(node -p "require('@sap/cds/package.json').version.split('.')[0]")
          want=${{ matrix.cds-major }}
          [[ "$got" == "$want" ]] || { echo "::error::cds runtime major $got != matrix $want"; exit 1; }
      - run: npm run test

  integration-tests:
    name: Integration Tests
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { node-version: 22.x, cds-version: 9,      db-major: 2, mtxs-major: 3, cds-major: 9  }
          - { node-version: 22.x, cds-version: latest, db-major: 3, mtxs-major: 4, cds-major: 10 }
          - { node-version: 24.x, cds-version: 9,      db-major: 2, mtxs-major: 3, cds-major: 9  }
          - { node-version: 24.x, cds-version: latest, db-major: 3, mtxs-major: 4, cds-major: 10 }
    steps:
      - name: Integration tests
        uses: cap-js/mcp/.github/actions/integration-tests@ci/prepare-cds10
        with:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          NODE_VERSION: ${{ matrix.node-version }}
          CDS_VERSION: ${{ matrix.cds-version }}
          DB_MAJOR: ${{ matrix.db-major }}
          MTXS_MAJOR: ${{ matrix.mtxs-major }}
          CDS_MAJOR: ${{ matrix.cds-major }}
