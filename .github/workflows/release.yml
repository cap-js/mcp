name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        cds-version: [latest, 8]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - run: npm i
      - run: npm run lint
      - run: cd tests/bookshop && npm i
      - run: npm run test
  publish-npm:
    permissions:
      contents: write
      id-token: write
    needs: test
    runs-on: ubuntu-latest
    # Template instruction: Replace <repository name> and delete this comment
    environment: npmjs:@cap-js/mcp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm i
      - name: get-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: Parse changelog
        id: parse-changelog
        uses: schwma/parse-changelog-action@v1.2.0
        with:
          version: '${{ steps.package-version.outputs.current-version }}'
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: 'v${{ steps.package-version.outputs.current-version }}'
          body: '${{ steps.parse-changelog.outputs.body }}'
      - name: Publish package to npmjs.com
        run: npm publish --access public --provenance
